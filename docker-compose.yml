services:
  # SERVIÇO 1: Banco de Dados Postgres
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bikelog_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      # Salva os dados do banco no seu PC para não perder as infos se o container reiniciar
      - pgdata:/var/lib/postgresql/data

  # SERVIÇO 2: A sua API
  api:
    build: .
    ports:
      # O seu Dockerfile mandou expor a 19003, então vamos mapear ela
      - "19003:19003"
    environment:
      # Opcional, mas útil para o Django ler depois
      - DB_HOST=db
      - DB_NAME=bikelog_db
      - DB_USER=admin
      - DB_PASSWORD=admin
    volumes:
      - .:/app
      # BURACO NEGRO: Impede que o túnel apague ou sobrescreva a .venv do container
      - /app/.venv
    depends_on:
      - db

volumes:
  pgdata: # Declara o volume do banco de dados